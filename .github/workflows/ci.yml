name: CI - Tests

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # FRONTEND
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install frontend
      run: |
        cd frontend/solicitudes-gastos
        npm install

    - name: Run frontend tests
      run: |
        cd frontend/solicitudes-gastos
        npm run test -- --watch=false

    # BACKEND
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Test backend
      run: |
        cd backend/SolicitudesGastos
        dotnet test